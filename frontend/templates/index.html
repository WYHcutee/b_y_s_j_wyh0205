<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>多模态恶意网站检测控制台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 悬浮球样式 */
        #floatingBall {
            position: absolute; /* 可拖拽 */
            bottom: 50px;
            right: 50px;
            width: 60px;
            height: 60px;
            background: #2563eb;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            transition: transform 0.2s;
        }

        #floatingBall:hover {
            transform: scale(1.1);
        }

        /* 为了让仪表盘好看，加一点简单样式 */
        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .gauge-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }
        .risk-text {
            font-size: 1.5rem;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="layout">
    <!-- 左侧菜单 -->
    <aside class="sidebar">
        <div class="logo">🛡 安全检测控制台</div>
        <ul>
            <li onclick="showPage('home')" class="active">首页检测</li>
            <li onclick="showPage('history')">检测记录</li>
            <li onclick="showPage('experiment')">实验评估</li>
            <li onclick="showPage('about')">系统说明</li>
        </ul>
    </aside>

    <!-- 主区域 -->
    <main class="main">
        <!-- 顶部状态栏 -->
        <div class="topbar">
            <div>系统状态：<span class="online">● 在线</span></div>
            <div>模型版本：DeepSeek</div>
        </div>

        <!-- 首页 -->
        <div id="home" class="page">
            <div class="search-card glass">
                <h2>网站安全检测</h2>
                <div class="search-box">
                    <input type="text" id="urlInput" placeholder="请输入需要检测的网址">
                    <button onclick="detect()">开始检测</button>
                </div>
            </div>
            <div id="loading" class="loading" style="display:none;">模型推理中...</div>
            <div id="resultSection" style="display:none;">

                <div id="analysisReason" class="glass" style="margin-top: 20px; padding: 15px;">
    <h4>详细分析</h4>
    <p id="reasonText"></p>
</div>

                <!-- 在三个卡片的后面，雷达图之前添加 -->
<div id="riskReport" class="glass" style="margin-top: 20px; padding: 20px;">
    <h3 style="margin-top: 0; color: #a5b4fc;">详细风险报告</h3>
    <div id="reportContent" style="line-height: 1.6; color: #e5e7eb; white-space: pre-wrap;"></div>
</div>

<div class="dashboard glass">
    <div class="gauge-container" style="position: relative; width: 200px; height: 200px; margin: 0 auto;">
        <svg width="200" height="200" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54" fill="none" stroke="#2d3748" stroke-width="12" />
            <circle id="gaugeProgress" cx="60" cy="60" r="54" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="339.292" transform="rotate(-90 60 60)" style="transition: stroke-dashoffset 0.5s;"/>
            <!-- 将原来的 text 和 tspan 注释掉，避免干扰 -->
            <!-- <text x="60" y="60" text-anchor="middle" dy="0.3em" font-size="20" fill="#fff">0</text> -->
        </svg>
        <!-- 新增一个绝对定位的 div 用于显示分数 -->
        <div id="scoreDisplay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: bold; color: white; text-shadow: 0 0 10px rgba(0,0,0,0.5);">0</div>
    </div>
    <div id="riskLevel" class="risk-text"></div>
</div>
                <!-- 三模态卡片 -->
                <div class="cards">
                    <div class="card glass">
                        <h3>URL 分析</h3>
                        <div id="urlResult"></div>
                    </div>
                    <div class="card glass">
                        <h3>文本分析</h3>
                        <div id="textResult"></div>
                    </div>
                    <div class="card glass">
                        <h3>图像分析</h3>
                        <div id="imageResult"></div>
                    </div>
                </div>
                <!-- 详细解释区域（可选） -->
                <div class="explain-card glass" id="explainBox" style="display:none;">
                    <p id="explainText"></p>
                </div>
                <button onclick="toggleExplain()" class="explain-btn">查看详细分析</button>
                <!-- 雷达图（可选） -->
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 其他页面（历史、实验、关于）保持不变 -->
        <div id="history" class="page" style="display:none;">
            <h2>检测历史</h2>
            <table id="historyTable" border="1" cellpadding="5" style="width:100%; border-collapse: collapse;">
                <thead>
                    <tr><th>URL</th><th>得分</th><th>等级</th><th>时间</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="experiment" class="page" style="display:none;">
            <h2>实验评估对比</h2>
            <canvas id="experimentChart"></canvas>
        </div>
        <div id="about" class="page" style="display:none;">
            <h2>系统说明</h2>
            <p>基于多模态大模型的恶意网站检测系统，综合利用URL、文本、图像信息进行风险评估。</p>
        </div>
    </main>
</div>

<!-- 悬浮球 -->
<div id="floatingBall">🛡</div>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
    // 点击悬浮球触发 detect()
    const ball = document.getElementById('floatingBall');
    ball.addEventListener('click', () => {
        detect();
    });

    // 拖拽功能
    let isDragging = false;
    let offsetX, offsetY;

    ball.addEventListener('mousedown', (e) => {
        isDragging = true;
        offsetX = e.clientX - ball.offsetLeft;
        offsetY = e.clientY - ball.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        ball.style.left = (e.clientX - offsetX) + "px";
        ball.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
    });
</script>

</body>
</html>
